<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Entrada - Mundial 2026</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css?v=2.0">
</head>
<body>
    <header class="navbar bg-primary-dark shadow-sm">
        <div class="container nav-content">

            <a href="/" class="brand" style="color: white;">🏆 FIFA 2026</a>

            <button id="btn-hamburguesa" class="menu-toggle" style="color: white;">☰</button>

            <div id="nav-menu" class="nav-links-container">
                <nav id="nav-left">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/partidos.html" class="nav-link">Partidos</a>
                </nav>
                <div id="nav-right"></div>
            </div>

        </div>
    </header>

    <main class="container">
        <div id="detalle-error" class="text-error" style="display: none; text-align: center; margin-top: 2rem; font-size: 1.2rem;"></div>

        <div id="detalle-content" style="display: none; max-width: 600px; margin: 2rem auto;">
            <h2 style="color: var(--color-primary-dark); margin-bottom: 1.5rem; text-align: center; font-weight: 800;">Comprar Entradas</h2>

            <div id="partido-info-container" style="margin-bottom: 2.5rem;"></div>

            <section class="card shadow-lg" style="padding: 2.5rem;">
                <h3 style="color: var(--color-primary-dark); margin-bottom: 1.5rem; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 0.5rem;">Seleccioná tus lugares</h3>

                <form id="form-compra">
                    <div class="form-group">
                        <label for="tipo-entrada">Categoría de entrada</label>
                        <select id="tipo-entrada" style="width: 100%; padding: 0.8rem; border-radius: 8px;">
                            <option value="1" data-precio="250">Categoría 1 - Laterales ($250)</option>
                            <option value="2" data-precio="150">Categoría 2 - Córners ($150)</option>
                            <option value="3" data-precio="100">Categoría 3 - Cabeceras ($100)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cantidad">Cantidad de tickets (Máximo 4)</label>
                        <input type="number" id="cantidad" min="1" max="4" value="1" style="font-size: 1rem;" required>
                    </div>

                    <div style="margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 600; font-size: 1.2rem;">Total estimado:</span>
                        <span id="precio-total" class="text-success" style="font-size: 1.8rem; font-weight: 800;">$250 USD</span>
                    </div>

                    <button type="submit" id="btn-comprar" class="btn btn-accent btn-full btn-lg" style="margin-top: 1.5rem; font-size: 1.1rem; text-transform: uppercase;">
                        Confirmar Pago
                    </button>
                </form>
            </section>
        </div>
    </main>

    <script type="module" src="js/detalle.js"></script>
</body>
</html>
