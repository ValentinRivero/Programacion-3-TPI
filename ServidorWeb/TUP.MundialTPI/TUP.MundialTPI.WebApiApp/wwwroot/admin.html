<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Mundial 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* Estilos específicos para el layout del Panel Admin */
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--color-bg);
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-color: var(--color-primary-dark);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-btn {
            padding: 1rem 1.5rem;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }

            .menu-btn:hover, .menu-btn.active {
                background-color: var(--color-primary);
                color: white;
                border-left: 4px solid var(--color-accent);
            }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border-top: 4px solid var(--color-primary);
        }

            .kpi-card h4 {
                margin: 0 0 0.5rem 0;
                color: var(--color-text-muted);
                font-size: 0.9rem;
                text-transform: uppercase;
            }

            .kpi-card .value {
                font-size: 2rem;
                font-weight: 800;
                color: var(--color-primary-dark);
            }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

            .admin-table th, .admin-table td {
                padding: 1rem;
                text-align: left;
                border-bottom: 1px solid #eee;
            }

            .admin-table th {
                background-color: var(--color-primary-light);
                color: white;
                font-weight: 600;
            }

            .admin-table tr:hover {
                background-color: #f9fafb;
            }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">⚙️ Admin Control</div>
        <button class="menu-btn active" data-target="dashboard-view">Dashboard</button>
        <button class="menu-btn" data-target="partidos-view">Gestión de Partidos</button>
        <button class="menu-btn" data-target="usuarios-view">Usuarios Registrados</button>
        <button class="menu-btn" data-target="tickets-view">Auditoría de Tickets</button>
        <div style="flex: 1;"></div>
        <a href="/" class="menu-btn" style="text-align: center; color: var(--color-accent);">Volver a la Web</a>
    </aside>

    <main class="main-content">
        <section id="dashboard-view" class="admin-view">
            <h2 style="color: var(--color-primary-dark); margin-bottom: 1.5rem;">Métricas en Vivo</h2>
            <div class="kpi-grid" id="kpi-container">
                <p>Cargando estadísticas...</p>
            </div>
        </section>

        <section id="partidos-view" class="admin-view" style="display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
                <h2 style="color: var(--color-primary-dark);">Gestión de Partidos</h2>
                <button id="btn-nuevo-partido" class="btn btn-accent">Crear Partido</button>
            </div>
            <table class="admin-table">
                <thead><tr><th>ID</th><th>Local</th><th>Visitante</th><th>Fase</th><th>Entradas</th><th>Acciones</th></tr></thead>
                <tbody id="tbody-partidos"></tbody>
            </table>
        </section>

        <section id="usuarios-view" class="admin-view" style="display: none;">
            <h2 style="color: var(--color-primary-dark); margin-bottom: 1.5rem;">Usuarios Registrados</h2>
            <table class="admin-table">
                <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th></tr></thead>
                <tbody id="tbody-usuarios"></tbody>
            </table>
        </section>

        <section id="tickets-view" class="admin-view" style="display: none;">
            <h2 style="color: var(--color-primary-dark); margin-bottom: 1.5rem;">Auditoría de Tickets</h2>
            <table class="admin-table">
                <thead><tr><th>Ticket #</th><th>Partido</th><th>Email Comprador</th><th>Tipo</th><th>Precio</th></tr></thead>
                <tbody id="tbody-tickets"></tbody>
            </table>
        </section>
    </main>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
