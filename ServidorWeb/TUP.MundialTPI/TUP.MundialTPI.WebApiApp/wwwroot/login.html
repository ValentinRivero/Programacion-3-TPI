<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Mundial 2026</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="navbar bg-primary-dark shadow-sm">
        <div class="container nav-content">
            <a href="/" class="brand" style="color: white;">🏆 FIFA 2026</a>

            <a href="/" class="btn btn-ghost" style="color: white;">
                ← Volver al inicio
            </a>
        </div>
    </header>

    <main class="container">
        <section class="card form-card shadow-lg">
            <h2 id="form-title" style="text-align: center; margin-bottom: 1.5rem; color: var(--color-primary-dark);">Iniciar Sesión</h2>

            <p id="error-msg" class="text-error" style="display: none; text-align: center; margin-bottom: 1rem;"></p>

            <form id="auth-form">
                <div class="form-group" id="group-nombre" style="display: none;">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" maxlength="50" pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+">
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" id="btn-submit" class="btn btn-accent btn-full">Ingresar</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <button type="button" id="btn-toggle-mode" style="background: none; border: none; color: var(--color-primary); cursor: pointer; font-weight: 600;">
                    ¿No tenés cuenta? Registrate acá
                </button>
            </div>
        </section>
    </main>

    <script type="module" src="js/login.js"></script>
</body>
</html>
